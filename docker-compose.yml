services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trainly
    # 5433 на хосте: чтобы не пересекаться с локальным PostgreSQL Windows на 5432
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trainly"]
      interval: 5s
      timeout: 5s
      retries: 5
